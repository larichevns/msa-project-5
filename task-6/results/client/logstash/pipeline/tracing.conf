input {
  tcp {
    port => 5000
    codec => json_lines
  }

  beats {
    port => 5044
  }
}

filter {
  if [fields][log_type] == "spring-batch" {
    mutate {
      add_field => { "service" => "spring-batch-etl" }
    }

    if [message] =~ /.*traceId.*/ {
      json {
        source => "message"
        target => "parsed"
      }

      if [parsed][traceId] {
        mutate {
          add_field => { "trace_id" => "%{[parsed][traceId]}" }
          add_field => { "span_id" => "%{[parsed][spanId]}" }
        }
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch-tracing:9200"]
    index => "spring-batch-tracing-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}