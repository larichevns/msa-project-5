version: '3.8'

services:
  # PostgreSQL Database
  postgresdb:
    image: postgres:15
    container_name: postgresdb-task6
    ports:
      - "5436:5432"
    volumes:
      - ./schema-all.sql:/docker-entrypoint-initdb.d/schema.sql
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=123456
      - POSTGRES_USER=postgres
      - POSTGRES_DB=productsdb
    networks:
      - tracing-network

  # Spring Batch Application with Tracing
  app:
    build: .
    container_name: spring-batch-tracing-app
    depends_on:
      - postgresdb
    ports:
      - "8082:8080"
    volumes:
      - ./input:/input
      - ./logs:/var/log/spring-batch
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - ENVIRONMENT=production
      - HOSTNAME=spring-batch-tracing-app
    networks:
      - tracing-network

  # Python Job Client
  job-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: job-client
    depends_on:
      - app
    volumes:
      - ./client/logs:/app/logs
    environment:
      - API_BASE_URL=http://spring-batch-tracing-app:8080
    networks:
      - tracing-network
    command: ["python", "/app/job_client.py"]


  # Elasticsearch for log storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: elasticsearch-tracing
    environment:
      - node.name=elasticsearch
      - cluster.name=docker-cluster
      - cluster.initial_master_nodes=elasticsearch
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9203:9200"
    networks:
      - tracing-network

  # Logstash for log processing with tracing support
  logstash:
    image: docker.elastic.co/logstash/logstash:8.8.0
    container_name: logstash-tracing
    ports:
      - "5046:5044"
      - "5003:5000/tcp"
      - "5003:5000/udp"
      - "9602:9600"
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - ./client/logstash/pipeline:/usr/share/logstash/pipeline
      - ./client/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
    depends_on:
      - elasticsearch
    networks:
      - tracing-network

  # Kibana for log visualization with tracing
  kibana:
    image: docker.elastic.co/kibana/kibana:8.8.0
    container_name: kibana-tracing
    ports:
      - "5603:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch-tracing:9200
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
    depends_on:
      - elasticsearch
    networks:
      - tracing-network


networks:
  tracing-network:
    driver: bridge

volumes:
  postgres-data:
  elasticsearch-data: