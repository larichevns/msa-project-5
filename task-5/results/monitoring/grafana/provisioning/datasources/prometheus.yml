apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus-batch:9090
    isDefault: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: POST
    editable: true

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch-batch:9200
    database: "spring-batch-*"
    jsonData:
      interval: Daily
      timeField: "@timestamp"
      esVersion: "8.8.0"
      logMessageField: message
      logLevelField: level
    editable: true