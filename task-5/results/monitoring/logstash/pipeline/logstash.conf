input {
  beats {
    port => 5044
    codec => json
  }
}

filter {
  # Parse JSON logs from Spring Boot
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "app"
    }
  }

  # Add fields from parsed JSON
  if [app] {
    mutate {
      add_field => {
        "service" => "%{[app][service]}"
        "environment" => "%{[app][environment]}"
        "hostname" => "%{[app][host]}"
        "loglevel" => "%{[app][level]}"
      }
    }

    # Extract MDC fields if present
    if [app][mdc] {
      mutate {
        add_field => {
          "job_id" => "%{[app][mdc][jobName]}"
          "product_id" => "%{[app][mdc][productId]}"
          "product_sku" => "%{[app][mdc][productSku]}"
        }
      }
    }
  }

  # Parse timestamp
  date {
    match => [ "[app][@timestamp]", "ISO8601" ]
    target => "@timestamp"
  }

  # Add index metadata
  mutate {
    add_field => {
      "[@metadata][index_prefix]" => "spring-batch"
    }
  }

  # Remove original message field to save space
  mutate {
    remove_field => [ "message" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch-batch:9200"]
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    template_name => "spring-batch"
    template => "/usr/share/logstash/templates/spring-batch.json"
    template_overwrite => true
  }

  # Debug output (remove in production)
  stdout {
    codec => rubydebug
  }
}